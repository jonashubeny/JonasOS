---
modules-search: [ local ]

instances:
  - id: rootfs
    module: unpackfs
    config: unpackfs.conf

  - id: sources-final
    module: sources
    config: sources-final.conf

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - hwclock
    - services-systemd
    - networkcfg
    - grubcfg
    - bootloader
    - sources-final
    - umount
  - show:
    - finished

branding: debian

prompt-install: true
dont-seed-partitions: false
